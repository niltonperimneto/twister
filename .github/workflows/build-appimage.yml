name: Build Twister AppImage

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-appimage:
    runs-on: ubuntu-latest
    container: fedora:41

    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            webkit2gtk4.1-devel \
            gtk3-devel \
            libsoup3-devel \
            javascriptcoregtk4.1-devel \
            libappindicator-gtk3-devel \
            librsvg2-devel \
            patchelf \
            systemd-devel \
            dbus-devel \
            openssl-devel \
            pkg-config \
            gcc \
            file \
            nodejs \
            npm \
            git

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-fedora41-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-fedora41-

      - name: Install frontend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Twister binary
        run: |
          npm run build
          cd src-tauri && cargo build --release

      - name: Bundle AppImage manually
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: 1
        run: |
          cd src-tauri/target/release/bundle/appimage/ || mkdir -p src-tauri/target/release/bundle/appimage && cd src-tauri/target/release/bundle/appimage/

          ARCH=x86_64
          APP=Twister
          BINARY=twister

          # Download tools
          curl -Lo linuxdeploy.AppImage https://github.com/tauri-apps/binary-releases/releases/download/linuxdeploy/linuxdeploy-x86_64.AppImage
          curl -Lo linuxdeploy-plugin-gtk.sh https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          curl -Lo linuxdeploy-plugin-appimage.AppImage https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x linuxdeploy.AppImage linuxdeploy-plugin-gtk.sh linuxdeploy-plugin-appimage.AppImage

          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp ../../$BINARY AppDir/usr/bin/
          cp ../../../../icons/128x128@2x.png AppDir/usr/share/icons/hicolor/256x256/apps/${BINARY}.png

          # Create desktop file
          cat > AppDir/${BINARY}.desktop <<EOF
          [Desktop Entry]
          Name=${APP}
          Exec=${BINARY}
          Icon=${BINARY}
          Type=Application
          Categories=Utility;
          EOF
          sed -i 's/^          //' AppDir/${BINARY}.desktop

          # Run linuxdeploy
          OUTPUT="${APP}_$(grep '"version"' ../../../../tauri.conf.json | head -1 | sed 's/.*: "\(.*\)".*/\1/')_amd64.AppImage" \
          ./linuxdeploy.AppImage \
            --appdir AppDir \
            --plugin gtk \
            --output appimage \
            --executable AppDir/usr/bin/$BINARY \
            --desktop-file AppDir/${BINARY}.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/${BINARY}.png

      - name: Upload AppImage to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/appimage/*.AppImage*
          tag_name: ${{ github.ref_name }}
          name: "Twister ${{ github.ref_name }}"
          body: "See the assets below to download and install Twister."
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
