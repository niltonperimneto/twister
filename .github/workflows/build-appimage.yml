name: Build Twister AppImage

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-appimage:
    runs-on: ubuntu-latest
    container: fedora:43

    steps:
      - name: Install system dependencies
        # --disablerepo='*openh264*': the fedora-cisco-openh264 repo is served
        #   from a single Cisco host with no mirrors and regularly times out,
        #   killing the whole job ("All mirrors were tried"). Nothing we need
        #   lives there — openh264 only comes in as a weak dependency.
        # install_weak_deps=False: skip recommended packages (multimedia
        #   codecs, pipewire, …) that a headless build container never uses.
        # retries=5: ride out transient mirror hiccups instead of failing.
        run: |
          dnf install -y \
            --disablerepo='*openh264*' \
            --setopt=install_weak_deps=False \
            --setopt=retries=5 \
            webkit2gtk4.1-devel \
            gtk3-devel \
            libsoup3-devel \
            javascriptcoregtk4.1-devel \
            libappindicator-gtk3-devel \
            librsvg2-devel \
            systemd-devel \
            dbus-devel \
            openssl-devel \
            pkg-config \
            gcc \
            file \
            jq \
            unzip \
            nodejs \
            git
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf --retry 5 --retry-delay 2 https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Bun
        run: |
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-fedora43-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-fedora43-

      - name: Install frontend dependencies
        run: |
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Install Tauri CLI
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf --retry 5 --retry-delay 2 https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall tauri-cli --version "^2" --no-confirm

      - name: Verify tag matches Cargo.toml (drift guard)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(sed -n 's/^version *= *"\(.*\)"/\1/p' src-tauri/Cargo.toml | head -1)
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME requires Cargo.toml version $TAG_VERSION but it is $CARGO_VERSION. Use scripts/release.sh to bump and tag atomically."
            exit 1
          fi
          echo "✓ Tag and Cargo.toml both at $TAG_VERSION"

      - name: Build Twister binary
        run: cargo tauri build --no-bundle

      - name: Bundle AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          OUTDIR=src-tauri/target/release/bundle/appimage
          rm -rf "$OUTDIR"
          mkdir -p "$OUTDIR"

          APP=Twister
          BINARY=twister

          # Use the git tag (strip leading 'v') when triggered by a tag push,
          # otherwise fall back to the version in tauri.conf.json.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' src-tauri/tauri.conf.json | head -1)
          fi

          # Build AppDir with just the binary (no bundled libs - use system libs).
          # Mirrors scripts/build-appimage.sh so local and CI artifacts match.
          install -Dm755 src-tauri/target/release/$BINARY AppDir/usr/bin/$BINARY
          install -Dm644 src-tauri/icons/128x128@2x.png \
            AppDir/usr/share/icons/hicolor/256x256/apps/${BINARY}.png
          install -Dm644 src-tauri/icons/128x128@2x.png AppDir/${BINARY}.png

          # Desktop entry: canonical .desktop with the Icon field rewritten to
          # "twister" to match the AppDir's top-level twister.png.
          install -Dm644 io.github.niltonperimneto.Twister.desktop \
            AppDir/${BINARY}.desktop
          sed -i 's|^Icon=.*|Icon=twister|' AppDir/${BINARY}.desktop

          # AppStream metainfo — lets appimaged / GNOME Software identify the bundle.
          install -Dm644 io.github.niltonperimneto.Twister.metainfo.xml \
            AppDir/usr/share/metainfo/io.github.niltonperimneto.Twister.metainfo.xml

          # Create AppRun
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "$HERE/usr/bin/twister" "$@"
          APPRUN
          sed -i 's/^          //' AppDir/AppRun
          chmod +x AppDir/AppRun

          # Download appimagetool and package (retry transient network failures)
          curl -fL --retry 5 --retry-delay 2 --retry-all-errors -o appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir "${OUTDIR}/${APP}_${VERSION}_amd64.AppImage"

      - name: Upload AppImage artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: Twister-AppImage
          path: src-tauri/target/release/bundle/appimage/Twister_*.AppImage

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Find the previous tag to diff against
          PREV=$(git tag --list 'v*' --sort=-version:refname \
                 | grep -v "^${TAG}$" | head -1)

          if [ -n "$PREV" ]; then
            RANGE="${PREV}..${TAG}"
          else
            RANGE="$TAG"
          fi

          {
            echo "## What's Changed"
            echo ""
            git log --no-merges --format="* %s (%h)" "$RANGE"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV:-}...${TAG}"
          } > release_notes.md

      - name: Sign AppImage (Tauri updater)
        if: startsWith(github.ref, 'refs/tags/') && secrets.TAURI_SIGNING_PRIVATE_KEY != ''
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/Twister_*_amd64.AppImage)
          # `tauri signer sign` writes "$APPIMAGE.sig" beside the AppImage and
          # picks up the key + password from the env vars above.
          cargo tauri signer sign "$APPIMAGE"
          ls -la "${APPIMAGE}" "${APPIMAGE}.sig"

      - name: Emit latest.json (Tauri updater manifest)
        if: startsWith(github.ref, 'refs/tags/') && secrets.TAURI_SIGNING_PRIVATE_KEY != ''
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE=src-tauri/target/release/bundle/appimage
          APPIMAGE_PATH=$(ls "$BUNDLE"/Twister_*_amd64.AppImage)
          APPIMAGE=$(basename "$APPIMAGE_PATH")
          SIGNATURE=$(cat "${APPIMAGE_PATH}.sig")
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          NOTES=$(cat release_notes.md 2>/dev/null || echo "Release ${VERSION}")
          URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/${APPIMAGE}"

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes "$NOTES" \
            --arg sig "$SIGNATURE" \
            --arg url "$URL" \
            '{
              version: $version,
              pub_date: $pub_date,
              notes: $notes,
              platforms: {
                "linux-x86_64": { signature: $sig, url: $url }
              }
            }' > "$BUNDLE/latest.json"

          echo "--- latest.json ---"
          cat "$BUNDLE/latest.json"

      - name: Upload AppImage to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/Twister_*_amd64.AppImage
            src-tauri/target/release/bundle/appimage/Twister_*_amd64.AppImage.sig
            src-tauri/target/release/bundle/appimage/latest.json
          fail_on_unmatched_files: false
          tag_name: ${{ github.ref_name }}
          name: "Twister ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
