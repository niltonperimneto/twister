name: Build Twister AppImage

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-appimage:
    runs-on: ubuntu-latest
    container: fedora:41

    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            webkit2gtk4.1-devel \
            gtk3-devel \
            libsoup3-devel \
            javascriptcoregtk4.1-devel \
            libappindicator-gtk3-devel \
            librsvg2-devel \
            systemd-devel \
            dbus-devel \
            openssl-devel \
            pkg-config \
            gcc \
            file \
            nodejs \
            npm \
            git

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-fedora41-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-fedora41-

      - name: Install frontend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Twister binary
        run: cargo tauri build --no-bundle

      - name: Bundle AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          OUTDIR=src-tauri/target/release/bundle/appimage
          rm -rf "$OUTDIR"
          mkdir -p "$OUTDIR"

          APP=Twister
          BINARY=twister

          # Use the git tag (strip leading 'v') when triggered by a tag push,
          # otherwise fall back to the version in tauri.conf.json.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' src-tauri/tauri.conf.json | head -1)
          fi

          # Build AppDir with just the binary (no bundled libs - use system libs)
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp src-tauri/target/release/$BINARY AppDir/usr/bin/
          cp src-tauri/icons/128x128@2x.png AppDir/usr/share/icons/hicolor/256x256/apps/${BINARY}.png
          cp src-tauri/icons/128x128@2x.png AppDir/${BINARY}.png

          # Create desktop file
          cat > AppDir/${BINARY}.desktop <<'DESKTOP'
          [Desktop Entry]
          Name=Twister
          Exec=twister
          Icon=twister
          Type=Application
          Categories=Utility;
          DESKTOP
          sed -i 's/^          //' AppDir/${BINARY}.desktop

          # Create AppRun
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "$HERE/usr/bin/twister" "$@"
          APPRUN
          sed -i 's/^          //' AppDir/AppRun
          chmod +x AppDir/AppRun

          # Download appimagetool and package
          curl -Lo appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir "${OUTDIR}/${APP}_${VERSION}_amd64.AppImage"

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Find the previous tag to diff against
          PREV=$(git tag --list 'v*' --sort=-version:refname \
                 | grep -v "^${TAG}$" | head -1)

          if [ -n "$PREV" ]; then
            RANGE="${PREV}..${TAG}"
          else
            RANGE="$TAG"
          fi

          {
            echo "## What's Changed"
            echo ""
            git log --no-merges --format="* %s (%h)" "$RANGE"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV:-}...${TAG}"
          } > release_notes.md

      - name: Upload AppImage to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/appimage/Twister_*.AppImage
          tag_name: ${{ github.ref_name }}
          name: "Twister ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
