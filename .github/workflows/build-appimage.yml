name: Build Twister AppImage

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-appimage:
    runs-on: ubuntu-latest
    container: fedora:41

    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            webkit2gtk4.1-devel \
            gtk3-devel \
            libsoup3-devel \
            javascriptcoregtk4.1-devel \
            libappindicator-gtk3-devel \
            librsvg2-devel \
            patchelf \
            systemd-devel \
            dbus-devel \
            openssl-devel \
            pkg-config \
            gcc \
            file \
            nodejs \
            npm \
            git

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-fedora41-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-fedora41-

      - name: Install frontend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Twister binary
        run: |
          npm run build
          cd src-tauri && cargo build --release

      - name: Bundle AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          OUTDIR=src-tauri/target/release/bundle/appimage
          mkdir -p "$OUTDIR"

          APP=Twister
          BINARY=twister
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: "\(.*\)".*/\1/')

          # Build AppDir with just the binary (no bundled libs - use system libs)
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp src-tauri/target/release/$BINARY AppDir/usr/bin/
          cp src-tauri/icons/128x128@2x.png AppDir/usr/share/icons/hicolor/256x256/apps/${BINARY}.png
          cp src-tauri/icons/128x128@2x.png AppDir/${BINARY}.png

          # Create desktop file
          cat > AppDir/${BINARY}.desktop <<'DESKTOP'
          [Desktop Entry]
          Name=Twister
          Exec=twister
          Icon=twister
          Type=Application
          Categories=Utility;
          DESKTOP
          sed -i 's/^          //' AppDir/${BINARY}.desktop

          # Create AppRun
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "$HERE/usr/bin/twister" "$@"
          APPRUN
          sed -i 's/^          //' AppDir/AppRun
          chmod +x AppDir/AppRun

          # Download appimagetool and package
          curl -Lo appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir "${OUTDIR}/${APP}_${VERSION}_amd64.AppImage"

      - name: Upload AppImage to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/appimage/*.AppImage*
          tag_name: ${{ github.ref_name }}
          name: "Twister ${{ github.ref_name }}"
          body: "See the assets below to download and install Twister."
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
